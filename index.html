<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>禅石排布 | Zen Stones</title>
  <meta name="description" content="在电子白砂上拖动石头，让耙纹围绕它们流动。一个可独立部署的东方极简互动网页。" />
  <meta name="theme-color" content="#efe5d4" />
  <meta property="og:title" content="禅石排布 | Zen Stones" />
  <meta property="og:description" content="在电子白砂上拖动石头，让耙纹围绕它们流动。" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <canvas id="sand"></canvas>
  <div class="ui">
    <div class="top">
      <div class="title">
        <div class="kicker">Visual Toy / Calm Composition</div>
        <h1>禅石排布</h1>
        <p>在一片电子白砂上，拖动石头，耙出纹路。它像游戏，又像一张会呼吸的海报。没有任务，但有秩序；没有通关，却很适合发呆。</p>
      </div>
      <div class="controls">
        <div class="row">
          <button id="shuffleBtn">换一组石头</button>
          <button id="rakeBtn">自动耙纹</button>
          <button id="calmBtn">归于平静</button>
          <button id="exportBtn">保存画面</button>
          <a class="ghost-link" href="https://github.com/wanxb/zen-stones" target="_blank" rel="noopener noreferrer">GitHub 仓库</a>
        </div>
        <div class="tip">
          <span class="badge">玩法：</span>拖拽石头改变构图；双击空白处落下一颗小石；自动生成的线条会围绕石头流动；按空格可隐藏浮层看纯画面。
        </div>
      </div>
    </div>
    <div></div>
    <div class="stats" id="statsPanel">
      <div class="footer">你现在在摆一座电子枯山水。</div>
      <div class="stat-grid">
        <div class="stat"><span>石头</span><strong id="stoneCount">0</strong></div>
        <div class="stat"><span>构图密度</span><strong id="density">低</strong></div>
        <div class="stat"><span>状态</span><strong id="mood">平静</strong></div>
      </div>
    </div>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/scene.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
