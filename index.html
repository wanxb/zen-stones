<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>禅石排布 | Zen Stones</title>
  <meta name="description" content="在电子白砂上拖动石头，让耙纹围绕它们流动。一个可独立部署的东方极简互动网页。" />
  <meta name="theme-color" content="#efe5d4" />
  <meta property="og:title" content="禅石排布 | Zen Stones" />
  <meta property="og:description" content="在电子白砂上拖动石头，让耙纹围绕它们流动。" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <canvas id="sand"></canvas>
  <div class="ui">
    <div class="top">
      <div class="title">
        <div class="kicker">Visual Toy / Calm Composition</div>
        <h1>禅石排布</h1>
        <p>在一片电子白砂上，拖动石头，耙出纹路。它像游戏，又像一张会呼吸的海报。没有任务，但有秩序；没有通关，却很适合发呆。</p>
      </div>
      <div class="controls">
        <div class="row">
          <button id="shuffleBtn">换一组石头</button>
          <button id="rakeBtn">自动耙纹</button>
          <button id="calmBtn">归于平静</button>
          <button id="exportBtn">保存画面</button>
          <a class="icon-link" href="https://github.com/wanxb/zen-stones" target="_blank" rel="noopener noreferrer" aria-label="查看 GitHub 仓库" title="GitHub 仓库">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M12 2C6.48 2 2 6.59 2 12.24c0 4.52 2.87 8.36 6.84 9.71.5.1.68-.22.68-.49 0-.24-.01-.89-.01-1.75-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.56 2.35 1.11 2.92.85.09-.67.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.27-.45-1.31.1-2.74 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.82c.85 0 1.7.12 2.5.36 1.9-1.33 2.74-1.05 2.74-1.05.55 1.43.2 2.47.1 2.74.65.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.23 10.23 0 0 0 22 12.24C22 6.59 17.52 2 12 2z"/>
            </svg>
          </a>
        </div>
        <div class="tip">
          <span class="badge">玩法：</span>拖拽石头改变构图；双击空白处落下一颗小石；自动生成的线条会围绕石头流动；按空格可隐藏浮层看纯画面。
        </div>
      </div>
    </div>
    <div></div>
    <div class="stats" id="statsPanel">
      <div class="footer">你现在在摆一座电子枯山水。</div>
      <div class="stat-grid">
        <div class="stat"><span>石头</span><strong id="stoneCount">0</strong></div>
        <div class="stat"><span>构图密度</span><strong id="density">低</strong></div>
        <div class="stat"><span>状态</span><strong id="mood">平静</strong></div>
      </div>
    </div>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/scene.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
